<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <title>SIPp错误统计报告</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #2c3e50; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .chart { width: 100%; height: 300px; margin: 20px 0; }
        .error { color: #e74c3c; }
        .warning { color: #f39c12; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>SIPp错误统计报告</h1>
    <p>生成时间: 2025-08-15 07:52:38</p>
    <p>总错误数: 0</p>
    
    <h2>错误类型分布</h2>
    <div class="chart">
        <canvas id="errorTypeChart"></canvas>
    </div>
    
    <h2>错误码分布</h2>
    <div class="chart">
        <canvas id="errorCodeChart"></canvas>
    </div>
    
    <h2>场景分布</h2>
    <div class="chart">
        <canvas id="scenarioChart"></canvas>
    </div>
    
    <h2>详细错误列表</h2>
    <table>
        <tr>
            <th>时间</th>
            <th>错误类型</th>
            <th>错误码</th>
            <th>描述</th>
            <th>场景</th>
            <th>详情</th>
        </tr>
    </table>
    
    <script>
        // 错误类型图表
        const typeCtx = document.getElementById('errorTypeChart').getContext('2d');
        new Chart(typeCtx, {
            type: 'pie',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: [
                        '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6',
                        '#e67e22', '#1abc9c', '#34495e', '#d35400', '#c0392b'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: '错误类型分布'
                    }
                }
            }
        });
        
        // 错误码图表
        const codeCtx = document.getElementById('errorCodeChart').getContext('2d');
        new Chart(codeCtx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: '错误次数',
                    data: [],
                    backgroundColor: '#3498db'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: '错误码分布'
                    }
                }
            }
        });
        
        // 场景图表
        const scenarioCtx = document.getElementById('scenarioChart').getContext('2d');
        new Chart(scenarioCtx, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: [
                        '#2ecc71', '#e74c3c', '#3498db', '#f39c12', '#9b59b6',
                        '#e67e22', '#1abc9c', '#34495e', '#d35400', '#c0392b'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: '场景分布'
                    }
                }
            }
        });
    </script>
</body>
</html>
